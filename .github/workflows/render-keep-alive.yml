name: Keep Render backend awake

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Check backend health
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          test -n "$BACKEND_URL"
          curl --fail --silent --show-error --max-time 30 \
            "$BACKEND_URL/livez"
