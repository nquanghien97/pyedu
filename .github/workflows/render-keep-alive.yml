name: Keep Render backend awake

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Check backend health
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          test -n "$BACKEND_URL"
          echo "Ping started at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          curl --fail --show-error --max-time 30 \
            --write-out "\nHTTP status: %{http_code}\nResponse time: %{time_total}s\n" \
            "$BACKEND_URL/livez"
